<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Currency Converter</title>
    <link rel="stylesheet" href="currencyconverter.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css" integrity="sha512-Evv84Mr4kqVGRNSgIGL/F/aIDqQb7xQ2vcrdIwxfjThSH8CSR7PBEakCr51Ck+w+/U6swU2Im1vVX0SVk9ABhg==" crossorigin="anonymous" referrerpolicy="no-referrer" />
</head>
<body>
    <div class="container">
        <h1>Currency Converter</h1>
        <form>
        <div class="amout">
         <p>Enter Amout :</p>
        <input type="number" value = 100>
        </div>
        <div class="dropdown">

         <div class="from">
            <p>From</p>
            <div class="select-container">
                <img src="https://flagsapi.com/USD/shiny/64.png">
                 <select name = "from">
                    <option value="USD" selected>USD</option>
                    <option value="INR">INR</option>
                </select>
            </div>
            </div>
            <i class="fa-solid fa-arrow-right-arrow-left"></i>
         <div class="to"><p>To</p>
            <div class="select-container">
             <img src="https://flagsapi.com/IN/shiny/64.png">
                <select name = "to">
                    <option value="INR" selected>INR</option>
                    <option value="USD">USD</option>
                </select>
            </div>
        </div>
        </div>
        
       <div class="msg">
            <p>1USD = 80 INR</p>
        </div>
            <button id="button"> Get Exchange Value</button>
        </form>
    </div>
    </div>

    <script src="currencyconverter.js"></script>
    <script src="cc"></script>
</body>
</html>
